<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>退職後の金融資産分析 - 解決策提案</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    width: 100%; height: 100%;
    background: #1a1a2e;
    overflow: hidden;
    font-family: 'Hiragino Sans', 'Meiryo', 'Segoe UI', sans-serif;
}

/* 16:9はJSで制御 */
#screen {
    display: flex;
    flex-direction: row;
    position: absolute;
    font-size: 15px;
    transform-origin: top left;
}

/* ===== 左パネル ===== */
.left-panel {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    padding: 10px 10px;
    overflow-y: auto;
    border-right: 2px solid rgba(255,255,255,0.12);
    width: 30%;
    height: 100%;
}

.left-title {
    text-align: center;
    font-size: 1.1em;
    font-weight: bold;
    color: #fff;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 2px solid #3498db;
    flex-shrink: 0;
}

.input-section {
    background: #f8f9fa;
    border-radius: 8px;
    padding: 9px 12px;
    margin-bottom: 6px;
    flex-shrink: 0;
}

.input-group {
    display: flex;
    align-items: center;
    margin-bottom: 5px;
}

.lbl {
    display: inline-block;
    width: 155px;
    text-align: right;
    margin-right: 8px;
    font-size: 0.8em;
    color: #444;
    white-space: nowrap;
}

.spinner {
    display: inline-flex;
    align-items: center;
}

.spinner input {
    text-align: right;
    width: 96px;
    padding: 4px 6px;
    border: 1px solid #ccc;
    border-radius: 4px;
    margin-right: 3px;
    font-size: 0.92em;
}

.spinner button {
    width: 22px; height: 22px;
    padding: 0; margin: 0 1px;
    cursor: pointer;
    border: 1px solid #bbb;
    background: #eee;
    border-radius: 3px;
    font-size: 0.8em;
    line-height: 20px;
}
.spinner button:hover { background: #ddd; }

.calc-btn {
    display: block;
    margin: 7px auto 6px;
    padding: 8px 28px;
    background: #27ae60;
    color: white; border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 1.0em; font-weight: bold;
    flex-shrink: 0;
}
.calc-btn:hover { background: #219a52; }
.calc-btn:disabled { background: #aaa; cursor: not-allowed; }

#result {
    padding: 5px 8px;
    background: #ebf5fb;
    border-left: 4px solid #3498db;
    border-radius: 4px;
    font-size: 0.8em;
    text-align: center; font-weight: bold;
    margin-bottom: 5px;
    display: none; flex-shrink: 0;
}

#chart-container {
    flex: 0 0 auto;
    min-height: 260px;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    overflow: hidden;
    display: none;
    background: #fff;
}
#chart_div { display: block; width: 100%; height: 100%; }

.chart-panel {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    padding: 10px 12px;
    overflow: hidden;
    border-right: 2px solid rgba(255,255,255,0.12);
    width: 47%;
    height: 100%;
}

.chart-title {
    text-align: center;
    font-size: 1.1em;
    font-weight: bold;
    color: #fff;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 2px solid #3498db;
    flex-shrink: 0;
}

/* ===== 右パネル ===== */
.right-panel {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    padding: 10px 10px;
    overflow-y: auto;
    width: 23%;
    height: auto;
    min-height: 420px;
}

.right-title {
    text-align: center;
    font-size: 1.04em; font-weight: bold;
    color: #fff;
    margin-bottom: 9px; padding-bottom: 6px;
    border-bottom: 2px solid #3498db;
    flex-shrink: 0;
}

.status-card {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 10px;
    padding: 7px 8px; margin-bottom: 8px;
    text-align: center; flex-shrink: 0;
}
.status-lbl { font-size: 0.8em; color: rgba(255,255,255,0.6); margin-bottom: 3px; }
.status-val { font-size: 1.24em; font-weight: bold; color: rgba(255,255,255,0.8); }
.status-val.neg { color: #ff6b6b; }
.status-val.pos { color: #51cf66; }

.sol-card {
    background: rgba(255,255,255,0.055);
    border: 1px solid rgba(255,255,255,0.11);
    border-radius: 10px;
    padding: 8px 8px; margin-bottom: 8px;
    flex-shrink: 0;
}
.sol-head { display: flex; align-items: center; margin-bottom: 7px; }
.sol-badge {
    padding: 3px 7px; border-radius: 20px;
    font-size: 0.78em; font-weight: bold; color: white;
    margin-right: 7px; flex-shrink: 0; white-space: nowrap;
}
.sol-badge.b1 { background: linear-gradient(135deg, #f5576c, #f093fb); }
.sol-badge.b2 { background: linear-gradient(135deg, #00c6ff, #4facfe); }
.sol-badge.b3 { background: linear-gradient(135deg, #38f9d7, #43e97b); }
.sol-ttl { font-size: 0.94em; font-weight: bold; color: #fff; }

.sol-vals { display: flex; align-items: stretch; gap: 5px; }
.vbox {
    flex: 1; background: rgba(0,0,0,0.28);
    border-radius: 6px; padding: 5px 6px; text-align: center;
}
.vbox.tgt {
    background: rgba(82,183,136,0.18);
    border: 1px solid rgba(82,183,136,0.38);
}
.vlbl { font-size: 0.72em; color: rgba(255,255,255,0.55); display: block; margin-bottom: 2px; }
.vnum { font-size: 0.95em; font-weight: bold; color: rgba(255,255,255,0.88); display: block; }
.vnum.ok { color: #fff; }
.arr { font-size: 1.1em; color: rgba(255,255,255,0.35); display: flex; align-items: center; padding: 0 2px; }
.sol-diff { margin-top: 6px; font-size: 0.8em; color: rgba(255,255,255,0.55); text-align: right; }
.sol-diff b { color: #52b788; }
.sol-msg { font-size: 0.94em; color: rgba(255,255,255,0.5); text-align: center; padding: 4px 0; font-style: italic; }
.sol-ok  { font-size: 0.96em; color: rgba(81,207,102,0.88); text-align: center; padding: 4px 0; }
.sol-note { font-size: 0.78em; color: rgba(255,255,255,0.35); text-align: center; margin-top: auto; padding-top: 6px; flex-shrink: 0; }

.manual-row {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 7px;
}
.manual-row label {
    flex: 1;
    color: rgba(255,255,255,0.62);
    font-size: 0.9em;
    font-weight: bold;
}
.manual-row input {
    width: 96px;
    padding: 5px 7px;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 5px;
    background: rgba(0,0,0,0.25);
    color: #fff;
    text-align: right;
    font-size: 0.94em;
    font-weight: bold;
}
.manual-row span {
    min-width: 28px;
    color: rgba(255,255,255,0.48);
    font-size: 0.86em;
}

.spinner input,
.manual-row input {
    width: 96px;
    height: 28px;
    padding: 4px 6px;
}
.manual-result {
    background: rgba(0,0,0,0.24);
    border-radius: 6px;
    padding: 7px 8px;
    text-align: center;
}
.manual-result .label {
    display: block;
    color: rgba(255,255,255,0.5);
    font-size: 0.72em;
    margin-bottom: 2px;
}
.manual-result .value {
    display: block;
    color: rgba(255,255,255,0.9);
    font-weight: bold;
    font-size: 1.02em;
}
.manual-result .value.pos { color: #51cf66; }
.manual-result .value.neg { color: #ff6b6b; }
.manual-hint {
    margin-top: 5px;
    color: rgba(255,255,255,0.42);
    font-size: 0.72em;
    text-align: center;
}
.combined-card {
    background: rgba(82,183,136,0.14);
    border: 1px solid rgba(82,183,136,0.38);
    border-radius: 8px;
    padding: 8px 10px;
    margin-bottom: 8px;
    flex-shrink: 0;
}
.combined-title {
    color: rgba(255,255,255,0.78);
    font-size: 0.82em;
    font-weight: bold;
    text-align: center;
    margin-bottom: 6px;
}

/* ===== スマホ（縦画面）対応 ===== */
@media (max-width: 820px) {
    html, body {
        height: auto;
        overflow: auto;
        -webkit-text-size-adjust: 100%;
    }
    #screen {
        position: static !important;
        transform: none !important;
        width: 100% !important;
        height: auto !important;
        left: 0 !important;
        top: 0 !important;
        flex-direction: column;
        font-size: 16px;
    }
    .left-panel, .chart-panel, .right-panel {
        width: 100% !important;
        height: auto !important;
        min-height: 0 !important;
        border-right: none;
        border-bottom: 2px solid rgba(255,255,255,0.12);
        overflow: visible;
    }
    .input-section { padding: 12px 14px; }
    .input-group { flex-wrap: wrap; }
    .lbl {
        width: 100%;
        text-align: left;
        margin-right: 0;
        margin-bottom: 4px;
        font-size: 0.95em;
    }
    .spinner { width: 100%; }
    .spinner input {
        flex: 1;
        width: auto;
        height: 40px;
        font-size: 1.05em;
    }
    .spinner button {
        width: 40px;
        height: 40px;
        font-size: 1em;
        line-height: 38px;
    }
    .calc-btn {
        width: 100%;
        padding: 14px;
        font-size: 1.15em;
    }
    #result { font-size: 0.95em; }
    #chart-container {
        height: 320px !important;
        min-height: 320px;
    }
    .manual-row input { height: 40px; font-size: 1.05em; }
}
</style>
</head>
<body>

<div id="screen">
  <!-- 左パネル -->
  <div class="left-panel">
    <div class="left-title">退職後の金融資産分析</div>
    <div class="input-section">
      <div class="input-group">
        <span class="lbl">退職年齢:</span>
        <div class="spinner">
          <input type="text" id="retirement_age" value="65">
          <button onclick="dec('retirement_age',1)">▼</button>
          <button onclick="inc('retirement_age',1)">▲</button>
        </div>
      </div>
      <div class="input-group">
        <span class="lbl">退職時の金融資産:</span>
        <div class="spinner">
          <input type="text" id="initial_asset" value="30,000,000">
          <button onclick="dec('initial_asset',5000000)">▼</button>
          <button onclick="inc('initial_asset',5000000)">▲</button>
        </div>
      </div>
      <div class="input-group">
        <span class="lbl">年金月額:</span>
        <div class="spinner">
          <input type="text" id="pension_per_month" value="150,000">
          <button onclick="dec('pension_per_month',10000)">▼</button>
          <button onclick="inc('pension_per_month',10000)">▲</button>
        </div>
      </div>
      <div class="input-group">
        <span class="lbl">毎月のその他収入:</span>
        <div class="spinner">
          <input type="text" id="other_income_per_month" value="0">
          <button onclick="dec('other_income_per_month',10000)">▼</button>
          <button onclick="inc('other_income_per_month',10000)">▲</button>
        </div>
      </div>
      <div class="input-group">
        <span class="lbl">毎月の支出:</span>
        <div class="spinner">
          <input type="text" id="expense_per_month" value="250,000">
          <button onclick="dec('expense_per_month',10000)">▼</button>
          <button onclick="inc('expense_per_month',10000)">▲</button>
        </div>
      </div>
      <div class="input-group">
        <span class="lbl">5年ごとの緊急資金:</span>
        <div class="spinner">
          <input type="text" id="emergency_fund_every_5years" value="500,000">
          <button onclick="dec('emergency_fund_every_5years',100000)">▼</button>
          <button onclick="inc('emergency_fund_every_5years',100000)">▲</button>
        </div>
      </div>
      <div class="input-group">
        <span class="lbl">インフレ率 (%):</span>
        <div class="spinner">
          <input type="text" id="inflation_rate" value="0.00">
          <button onclick="decR('inflation_rate')">▼</button>
          <button onclick="incR('inflation_rate')">▲</button>
        </div>
      </div>
      <div class="input-group">
        <span class="lbl">投資収益率 (%):</span>
        <div class="spinner">
          <input type="text" id="investment_rate" value="0.00">
          <button onclick="decR('investment_rate')">▼</button>
          <button onclick="incR('investment_rate')">▲</button>
        </div>
      </div>
      <div class="input-group">
        <span class="lbl">年金増加率 (%):</span>
        <div class="spinner">
          <input type="text" id="pension_increase_rate" value="1.00">
          <button onclick="decR('pension_increase_rate')">▼</button>
          <button onclick="incR('pension_increase_rate')">▲</button>
        </div>
      </div>
      <div class="input-group">
        <span class="lbl">確認したい年齢:</span>
        <div class="spinner">
          <input type="text" id="check_age" value="90">
          <button onclick="dec('check_age',1)">▼</button>
          <button onclick="inc('check_age',1)">▲</button>
        </div>
      </div>
    </div>

    <button class="calc-btn" id="calcBtn" onclick="runCalc()">計算実行</button>
    <div id="result"></div>
  </div>

  <!-- グラフパネル -->
  <div class="chart-panel">
    <div class="chart-title">金融資産推移グラフ</div>
    <div id="chart-container"><canvas id="chart_div"></canvas></div>
  </div>

  <!-- 右パネル -->
  <div class="right-panel">
    <div class="right-title">💡 資産をゼロにする解決策</div>
    <div class="status-card">
      <div class="status-lbl" id="sLbl">計算を実行してください</div>
      <div class="status-val" id="sVal">—</div>
    </div>
    <div class="sol-card">
      <div class="sol-head"><span class="sol-badge b1">解決策1</span><span class="sol-ttl">その他の収入を増やす</span></div>
      <div id="sol1"><div class="sol-msg">計算を実行してください</div></div>
    </div>
    <div class="sol-card">
      <div class="sol-head"><span class="sol-badge b2">解決策2</span><span class="sol-ttl">運用利率を上げる</span></div>
      <div id="sol2"><div class="sol-msg">計算を実行してください</div></div>
    </div>
    <div class="sol-card">
      <div class="sol-head"><span class="sol-badge b3">解決策3</span><span class="sol-ttl">毎月の支出を減らす</span></div>
      <div id="sol3"><div class="sol-msg">計算を実行してください</div></div>
    </div>
    <div class="sol-note">※ 計算後、各解決策に自分で数値を入力すると確認年齢時点の資産残高・左側の文章・グラフを再計算します</div>
  </div>
</div>

<script>
/* ===== 画面サイズ制御 ===== */
function isMobileLayout() {
    return window.matchMedia('(max-width: 820px)').matches;
}
function resize() {
    var s = document.getElementById('screen');
    if (isMobileLayout()) {
        // スマホでは縮小拡大せず、CSSの縦並びレイアウトに任せる
        s.style.width = '';
        s.style.height = '';
        s.style.left = '';
        s.style.top = '';
        s.style.transform = '';
        syncChartHeight();
        return;
    }
    var topPad = 10;
    var baseW = 1600;
    var baseH = 900;
    var availW = window.innerWidth;
    var availH = Math.max(1, window.innerHeight - topPad);
    var scale = Math.min(availW / baseW, availH / baseH);
    var left = Math.max(0, Math.round((availW - baseW * scale) / 2));

    s.style.width  = baseW + 'px';
    s.style.height = baseH + 'px';
    s.style.left   = left + 'px';
    s.style.top    = topPad + 'px';
    s.style.transform = 'scale(' + scale + ')';
    syncChartHeight();
}
resize();
window.addEventListener('resize', resize);

function syncChartHeight() {
    var result = document.getElementById('result');
    var input = document.querySelector('.input-section');
    var chart = document.getElementById('chart-container');
    var right = document.querySelector('.right-panel');
    if (!chart || chart.style.display === 'none') return;
    if (isMobileLayout()) return;  // スマホではCSSで高さを固定

    var target = result && result.style.display !== 'none' ? result : input;
    if (!target) return;

    var h = Math.max(260, Math.round((target.offsetTop + target.offsetHeight) - chart.offsetTop));
    chart.style.height = h + 'px';

    if (right) {
        var rightH = Math.max(420, Math.round((target.offsetTop + target.offsetHeight) - right.offsetTop));
        right.style.height = rightH + 'px';
    }
}

/* ===== ヘルパー ===== */
function fmt(v) {
    var n = String(v).replace(/,/g, '');
    if (isNaN(parseFloat(n))) return '0';
    return Number(n).toLocaleString('ja-JP');
}
function parse(v) { return parseFloat(String(v).replace(/,/g, '')) || 0; }

function inc(id, step) { var e = document.getElementById(id); e.value = fmt(parse(e.value) + step); }
function dec(id, step) {
    var e = document.getElementById(id);
    var v = parse(e.value) - step;
    if (v < 0 && id !== 'initial_asset') v = 0;
    e.value = fmt(v);
}
function incR(id) { var e = document.getElementById(id); e.value = (parseFloat(e.value) + 1).toFixed(2); }
function decR(id) { var e = document.getElementById(id); e.value = (parseFloat(e.value) - 1).toFixed(2); }

/* 初期フォーマット */
['retirement_age','initial_asset','pension_per_month','other_income_per_month',
 'expense_per_month','emergency_fund_every_5years','check_age'].forEach(function(id) {
    var e = document.getElementById(id);
    e.value = fmt(parse(e.value));
    e.addEventListener('blur', function() { this.value = fmt(parse(this.value)); });
});
['inflation_rate','investment_rate','pension_increase_rate'].forEach(function(id) {
    var e = document.getElementById(id);
    e.value = (parseFloat(e.value) || 0).toFixed(2);
    e.addEventListener('blur', function() {
        var n = parseFloat(this.value.replace(/[^0-9.-]/g, ''));
        this.value = isNaN(n) ? '0.00' : n.toFixed(2);
    });
});

/* ===== 計算コア ===== */
function calcCore(inp, overrides) {
    var p = {};
    for (var k in inp) p[k] = inp[k];
    if (overrides) for (var k in overrides) p[k] = overrides[k];

    var ca = p.initial_asset;
    var rows = [], below = null, atCheck = null;
    for (var i = 0; i < 36; i++) {
        var age = p.retirement_age + i;
        ca += ca * p.investment_rate;
        ca += (p.pension_per_month * Math.pow(1 + p.pension_increase_rate, i) + p.other_income_per_month) * 12;
        ca -= p.expense_per_month * Math.pow(1 + p.inflation_rate, i) * 12;
        if (i > 0 && i % 5 === 0) ca -= p.emergency_fund_every_5years;
        rows.push({age: age, val: ca});
        if (ca < 0 && below === null) below = age;
        if (age === p.check_age) atCheck = ca;
    }
    return {rows: rows, below: below, atCheck: atCheck};
}

/* ===== 二分探索 ===== */
function bisect(inp, key, low, high, positive) {
    // positive=true: 上げると資産増、false: 下げると資産増
    var test = function(v) {
        var ov = {}; ov[key] = v;
        return calcCore(inp, ov).atCheck;
    };
    if (positive) {
        if (test(high) < 0) return null;
    } else {
        if (test(low) < 0) return null;
    }
    for (var i = 0; i < 80; i++) {
        var mid = (low + high) / 2;
        if (test(mid) < 0) {
            if (positive) low = mid; else high = mid;
        } else {
            if (positive) high = mid; else low = mid;
        }
        if (Math.abs(high - low) < 0.0001) break;
    }
    return (low + high) / 2;
}

/* ===== グラフ描画（Canvas） ===== */
function drawChart(rows, checkAge, retAge) {
    var cont   = document.getElementById('chart-container');
    var canvas = document.getElementById('chart_div');
    canvas.width  = cont.clientWidth  || 400;
    canvas.height = cont.clientHeight || 250;
    var ctx = canvas.getContext('2d');
    var W = canvas.width, H = canvas.height;

    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H);

    var vals = rows.map(function(r) { return r.val; });
    var posMax = Math.max.apply(null, vals.concat([0]));
    var negMin = Math.min.apply(null, vals.concat([0]));
    var range  = posMax - negMin || 1;
    posMax += range * 0.08; negMin -= range * 0.05;
    if (negMin > 0) negMin = 0;
    range = posMax - negMin;

    var pL=86, pR=18, pT=34, pB=48;
    var cW = W-pL-pR, cH = H-pT-pB;
    function toY(v) { return pT + (1-(v-negMin)/range)*cH; }
    var z = toY(0);

    function fmtY(v) {
        var m = v/10000;
        if (Math.abs(m)>=10000) return (m/10000).toFixed(0)+'億';
        if (Math.abs(m)>=1000)  return (m/1000).toFixed(1)+'千万';
        if (Math.abs(m)>=100)   return (m/100).toFixed(0)+'百万';
        return m.toFixed(0)+'万';
    }

    ctx.font = '12px sans-serif';
    for (var g=0; g<=5; g++) {
        var gy = pT+(g/5)*cH, gv = posMax-(g/5)*range;
        ctx.strokeStyle='#e8e8e8'; ctx.lineWidth=1; ctx.setLineDash([]);
        ctx.beginPath(); ctx.moveTo(pL,gy); ctx.lineTo(pL+cW,gy); ctx.stroke();
        ctx.fillStyle='#777'; ctx.textAlign='right';
        ctx.fillText(fmtY(gv), pL-7, gy+4);
    }

    ctx.strokeStyle='#aaa'; ctx.lineWidth=1.5; ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(pL,z); ctx.lineTo(pL+cW,z); ctx.stroke();

    var n=rows.length, slotW=cW/n, barW=Math.max(2,slotW*0.65);
    for (var i=0; i<n; i++) {
        var v=rows[i].val, bx=pL+i*slotW+(slotW-barW)/2;
        ctx.fillStyle = v>=0 ? '#4caf50' : '#e53935';
        if (v>=0) ctx.fillRect(bx,toY(v),barW,Math.max(1,z-toY(v)));
        else      ctx.fillRect(bx,z,barW,Math.max(1,toY(v)-z));
    }

    for (var ci=0; ci<rows.length; ci++) {
        if (rows[ci].age===checkAge) {
            var cx=pL+ci*slotW+slotW/2;
            ctx.strokeStyle='#e53935'; ctx.lineWidth=1.5; ctx.setLineDash([4,4]);
            ctx.beginPath(); ctx.moveTo(cx,pT); ctx.lineTo(cx,pT+cH); ctx.stroke();
            ctx.setLineDash([]); break;
        }
    }

    ctx.font='12px sans-serif'; ctx.fillStyle='#555'; ctx.textAlign='center';
    for (var ai=0; ai<rows.length; ai++) {
        if ((rows[ai].age-retAge)%2===0) {
            ctx.fillText(rows[ai].age, pL+ai*slotW+slotW/2, pT+cH+18);
        }
    }

    ctx.strokeStyle='#bbb'; ctx.lineWidth=1; ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(pL,pT); ctx.lineTo(pL,pT+cH); ctx.stroke();
    ctx.font='13px sans-serif'; ctx.fillStyle='#666'; ctx.textAlign='center';
    ctx.fillText('年齢', pL+cW/2, H-8);
    ctx.font='bold 15px sans-serif'; ctx.fillStyle='#333';
    ctx.fillText('退職後の資産推移（予測）', pL+cW/2, 22);
}

/* ===== 右パネル更新 ===== */
/* ===== 手入力シミュレーション ===== */
var latestInput = null;

function yenText(v) {
    return (v >= 0 ? '+' : '') + Math.round(v).toLocaleString('ja-JP') + ' 円';
}

function manualResultHtml(val) {
    var cls = val > 0 ? 'pos' : (val < 0 ? 'neg' : '');
    var hint = val >= 0 ? 'この入力値なら確認年齢時点で黒字です' : 'この入力値では確認年齢時点で不足します';
    return '<div class="manual-result">' +
             '<span class="label">確認年齢時点の資産残高</span>' +
             '<span class="value '+cls+'">'+yenText(val)+'</span>' +
           '</div>' +
           '<div class="manual-hint">'+hint+'</div>';
}

function manualSolHtml(no, label, inputId, value, suffix, resultId) {
    return '<div class="manual-row">' +
             '<label for="'+inputId+'">'+label+'</label>' +
             '<input type="text" id="'+inputId+'" value="'+value+'" oninput="recalcManualAll()" onblur="formatManualSol('+no+')">' +
             '<span>'+suffix+'</span>' +
           '</div>';
}

function updateManualSol(inp, atCheck) {
    latestInput = inp;
    var ck = inp.check_age;
    document.getElementById('sLbl').textContent = ck+'歳時点の資産残高（予測）';

    if (atCheck === null) {
        document.getElementById('sVal').textContent = '計算範囲外';
        document.getElementById('sVal').className = 'status-val';
        ['sol1','sol2','sol3'].forEach(function(id){
            document.getElementById(id).innerHTML='<div class="sol-msg">確認年齢が計算範囲外です</div>';
        });
        var combinedEl = document.getElementById('combinedSol');
        if (combinedEl) combinedEl.innerHTML = '<div class="sol-msg">確認年齢が計算範囲外です</div>';
        return;
    }

    var sv = document.getElementById('sVal');
    sv.textContent = yenText(atCheck);
    sv.className = 'status-val ' + (atCheck>0?'pos':atCheck<0?'neg':'');

    document.getElementById('sol1').innerHTML =
        manualSolHtml(1, 'その他の収入（月額）', 'manual_other_income', inp.other_income_per_month.toLocaleString('ja-JP'), '円/月', 'manual_result1');
    document.getElementById('sol2').innerHTML =
        manualSolHtml(2, '運用利率（年率）', 'manual_investment_rate', (inp.investment_rate * 100).toFixed(2), '%', 'manual_result2');
    document.getElementById('sol3').innerHTML =
        manualSolHtml(3, '毎月の支出', 'manual_expense', inp.expense_per_month.toLocaleString('ja-JP'), '円/月', 'manual_result3');

    recalcManualAll();
}

function getManualOverrides() {
    return {
        other_income_per_month: parse(document.getElementById('manual_other_income').value),
        investment_rate: (parseFloat(document.getElementById('manual_investment_rate').value.replace(/[^0-9.-]/g, '')) || 0) / 100,
        expense_per_month: parse(document.getElementById('manual_expense').value)
    };
}

function updateResultSummary(inp, res) {
    var res_div = document.getElementById('result');
    var msg = '';
    if (res.below !== null) {
        msg += '金融資産がマイナスになるのは <strong>'+res.below+' 歳頃</strong> です。<br>';
    } else {
        msg += '計算期間中、金融資産がマイナスになることはありませんでした。<br>';
    }
    if (res.atCheck !== null) {
        msg += inp.check_age+'歳時点の資産残高: 約 <strong>'+
               Math.round(res.atCheck).toLocaleString('ja-JP')+' 円</strong>';
    } else {
        msg += inp.check_age+'歳は計算範囲外（'+inp.retirement_age+'〜'+(inp.retirement_age+35)+'歳）です。';
    }
    res_div.innerHTML = msg;
    res_div.style.display = 'block';
}

function recalcManualSol(no) {
    if (!latestInput) return;

    var overrides = {};
    if (no === 1) {
        overrides.other_income_per_month = parse(document.getElementById('manual_other_income').value);
    } else if (no === 2) {
        overrides.investment_rate = (parseFloat(document.getElementById('manual_investment_rate').value.replace(/[^0-9.-]/g, '')) || 0) / 100;
    } else if (no === 3) {
        overrides.expense_per_month = parse(document.getElementById('manual_expense').value);
    }

    var res = calcCore(latestInput, overrides);
    var target = document.getElementById('manual_result' + no);
    target.innerHTML = res.atCheck === null ? '<div class="sol-msg">確認年齢が計算範囲外です</div>' : manualResultHtml(res.atCheck);
}

function recalcManualAll() {
    if (!latestInput) return;

    var combined = calcCore(latestInput, getManualOverrides());
    var sv = document.getElementById('sVal');
    if (combined.atCheck === null) {
        sv.textContent = '計算範囲外';
        sv.className = 'status-val';
    } else {
        sv.textContent = yenText(combined.atCheck);
        sv.className = 'status-val ' + (combined.atCheck>0?'pos':combined.atCheck<0?'neg':'');
    }
    updateResultSummary(latestInput, combined);

    var chart_c = document.getElementById('chart-container');
    if (chart_c && chart_c.style.display !== 'none') {
        syncChartHeight();
        drawChart(combined.rows, latestInput.check_age, latestInput.retirement_age);
    }
}

function formatManualSol(no) {
    if (no === 1) {
        var e1 = document.getElementById('manual_other_income');
        e1.value = fmt(parse(e1.value));
    } else if (no === 2) {
        var e2 = document.getElementById('manual_investment_rate');
        var n = parseFloat(e2.value.replace(/[^0-9.-]/g, ''));
        e2.value = isNaN(n) ? '0.00' : n.toFixed(2);
    } else if (no === 3) {
        var e3 = document.getElementById('manual_expense');
        e3.value = fmt(parse(e3.value));
    }
    recalcManualAll();
}
function updateSol(inp, atCheck) {
    return updateManualSol(inp, atCheck);
    var ck = inp.check_age;
    document.getElementById('sLbl').textContent = ck+'歳時点の資産残高（予測）';

    if (atCheck === null) {
        document.getElementById('sVal').textContent = '計算範囲外';
        document.getElementById('sVal').className = 'status-val';
        ['sol1','sol2','sol3'].forEach(function(id){
            document.getElementById(id).innerHTML='<div class="sol-msg">確認年齢が計算範囲外です</div>';
        });
        return;
    }

    var sv = document.getElementById('sVal');
    sv.textContent = (atCheck>=0?'+':'') + Math.round(atCheck).toLocaleString('ja-JP') + ' 円';
    sv.className   = 'status-val ' + (atCheck>0?'pos':atCheck<0?'neg':'');

    if (atCheck >= 0) {
        var ok = '<div class="sol-ok">✅ '+ck+'歳時点の資産は黒字！現在の計画は健全です。</div>';
        document.getElementById('sol1').innerHTML = ok;
        document.getElementById('sol2').innerHTML = ok;
        document.getElementById('sol3').innerHTML = ok;
        return;
    }

    /* 解決策1：その他収入を増やす */
    var r1 = bisect(inp, 'other_income_per_month',
        inp.other_income_per_month, inp.other_income_per_month+10000000, true);
    if (r1 === null) {
        document.getElementById('sol1').innerHTML='<div class="sol-msg">解決策が見つかりません</div>';
    } else {
        r1 = Math.ceil(r1);
        var d1 = r1 - inp.other_income_per_month;
        document.getElementById('sol1').innerHTML=
            '<div class="sol-vals">'+
              '<div class="vbox"><span class="vlbl">現在の収入</span><span class="vnum">'+inp.other_income_per_month.toLocaleString('ja-JP')+' 円/月</span></div>'+
              '<div class="arr">→</div>'+
              '<div class="vbox tgt"><span class="vlbl">必要な収入</span><span class="vnum ok">'+r1.toLocaleString('ja-JP')+' 円/月</span></div>'+
            '</div>'+
            '<div class="sol-diff">月額 <b>＋'+d1.toLocaleString('ja-JP')+' 円</b> の収入増が必要</div>';
    }

    /* 解決策2：運用利率を上げる */
    var r2 = bisect(inp, 'investment_rate', inp.investment_rate, 0.5, true);
    if (r2 === null) {
        document.getElementById('sol2').innerHTML='<div class="sol-msg">解決策が見つかりません（50%超が必要）</div>';
    } else {
        var curP=(inp.investment_rate*100).toFixed(2), newP=(r2*100).toFixed(2);
        var dP=(r2*100-inp.investment_rate*100).toFixed(2);
        document.getElementById('sol2').innerHTML=
            '<div class="sol-vals">'+
              '<div class="vbox"><span class="vlbl">現在の利率</span><span class="vnum">'+curP+' %</span></div>'+
              '<div class="arr">→</div>'+
              '<div class="vbox tgt"><span class="vlbl">必要な利率</span><span class="vnum ok">'+newP+' %</span></div>'+
            '</div>'+
            '<div class="sol-diff"><b>＋'+dP+' %</b> の利率向上が必要</div>';
    }

    /* 解決策3：支出を減らす */
    var r3 = bisect(inp, 'expense_per_month', 0, inp.expense_per_month, false);
    if (r3 === null) {
        document.getElementById('sol3').innerHTML='<div class="sol-msg">解決策が見つかりません（支出ゼロでも不足）</div>';
    } else {
        r3 = Math.floor(r3);
        var d3 = inp.expense_per_month - r3;
        document.getElementById('sol3').innerHTML=
            '<div class="sol-vals">'+
              '<div class="vbox"><span class="vlbl">現在の支出</span><span class="vnum">'+inp.expense_per_month.toLocaleString('ja-JP')+' 円/月</span></div>'+
              '<div class="arr">→</div>'+
              '<div class="vbox tgt"><span class="vlbl">目標支出</span><span class="vnum ok">'+r3.toLocaleString('ja-JP')+' 円/月</span></div>'+
            '</div>'+
            '<div class="sol-diff">月額 <b>－'+d3.toLocaleString('ja-JP')+' 円</b> の削減が必要</div>';
    }
}

/* ===== 計算実行 ===== */
function runCalc() {
    var btn  = document.getElementById('calcBtn');
    var res_div = document.getElementById('result');
    var chart_c = document.getElementById('chart-container');

    btn.disabled = true;
    res_div.style.display = 'none';
    chart_c.style.display = 'none';

    var inp = {
        retirement_age:              parse(document.getElementById('retirement_age').value),
        initial_asset:               parse(document.getElementById('initial_asset').value),
        pension_per_month:           parse(document.getElementById('pension_per_month').value),
        other_income_per_month:      parse(document.getElementById('other_income_per_month').value),
        expense_per_month:           parse(document.getElementById('expense_per_month').value),
        emergency_fund_every_5years: parse(document.getElementById('emergency_fund_every_5years').value),
        inflation_rate:              parseFloat(document.getElementById('inflation_rate').value) / 100,
        investment_rate:             parseFloat(document.getElementById('investment_rate').value) / 100,
        pension_increase_rate:       parseFloat(document.getElementById('pension_increase_rate').value) / 100,
        check_age:                   parse(document.getElementById('check_age').value)
    };

    try {
        var res = calcCore(inp);
        updateResultSummary(inp, res);

        chart_c.style.display = 'block';
        setTimeout(function() {
            syncChartHeight();
            drawChart(res.rows, inp.check_age, inp.retirement_age);
        }, 50);

        updateSol(inp, res.atCheck);

    } catch(e) {
        res_div.innerHTML = '<span style="color:red">エラー: ' + e.message + '</span>';
        res_div.style.display = 'block';
    }

    btn.disabled = false;
}
